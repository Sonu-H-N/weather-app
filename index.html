<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather Pro</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4facfe">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <!-- Notification -->
    <div id="notification" class="notification"></div>

    <!-- Sky Effects -->
    <div class="sky-effects">

        <div class="sun" id="sun">
            <div class="sun-face">
                <div class="eye left-eye"></div>
                <div class="eye right-eye"></div>
                <div class="smile"></div>
            </div>
        </div>

        <div class="shooting-stars" id="shootingStars"></div>

        <div class="stars" id="stars"></div>

        <div class="moon" id="moon">🌙</div>

    </div>

    <!-- Clouds -->
    <div class="clouds">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
    </div>

    <!-- Weather Effects -->
    <div class="rain" id="rain"></div>
    <div class="lightning" id="lightning"></div>
    <div class="rainbow" id="rainbow"></div>

    <!-- Main App -->
    <div class="app">

        <!-- Header -->
        <header>

            <h1>🌤️ Weather Pro</h1>

            <button id="themeToggle">🌙</button>

        </header>

        <!-- Search Box -->
        <div class="search-box">

            <input
                id="cityInput"
                type="text"
                placeholder="Search city...">

            <button onclick="handleSearch()">Search</button>

            <button onclick="startVoiceSearch()">🎤</button>

            <button onclick="addFavorite()">⭐</button>

        </div>

        <!-- History Section -->
        <div class="history">

            <div class="history-buttons">

                <button onclick="clearFavorites()" class="clear-btn">
                    Clear Favorites
                </button>

                <button onclick="clearHistory()" class="clear-btn">
                    Clear History
                </button>

            </div>

            <h3>🕒 Recent Searches</h3>

            <div id="historyList"></div>

        </div>

        <!-- Loader -->
        <div id="loader" class="loader"></div>

        <!-- Weather Card -->
        <div class="weather-card">

            <h2 id="cityName">City</h2>

            <div class="temp" id="temperature">--°C</div>

            <p id="description">Weather condition</p>

        </div>

        <!-- Forecast -->
        <div class="forecast" id="forecast"></div>

        <!-- Chart -->
        <div class="chart-container">
            <canvas id="tempChart"></canvas>
        </div>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
