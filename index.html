<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather Pro</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4facfe">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<div id="notification" class="notification"></div>
<body>

<!-- Sky Effects -->
<div class="sky-effects">
<div class="sun" id="sun">
<div class="sun-face">
<div class="eye left-eye"></div>
<div class="eye right-eye"></div>
<div class="smile"></div>
<div class="shooting-stars" id="shootingStars"></div>
</div>
</div>

<div class="stars" id="stars"></div>
<div class="moon" id="moon">🌙</div>
</div>

<div class="clouds">
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>
</div>

<div class="rain" id="rain"></div>
<div class="lightning" id="lightning"></div>
<div class="rainbow" id="rainbow"></div>

<!-- Main Card -->

<div class="app">

<header>

<h1>Weather Pro</h1>

<button id="themeToggle">🌙</button>

</header>

<!-- Search -->

<<div class="search-box">

<input id="cityInput" placeholder="Search city">

<button onclick="handleSearch()">Search</button>

<button onclick="startVoiceSearch()">🎤</button>
<button onclick="addFavorite()">⭐</button>
<div class="history">

<h3>🕒 Recent Searches</h3>

<div id="historyList"></div>

</div>
remove the blue background in the login page and make the password box same size as the username box

</div>
<div id="loader" class="loader"></div>

<!-- Weather -->

<div class="weather-card">

<h2 id="cityName">City</h2>

<div class="temp" id="temperature">--°C</div>

<p id="description">Weather condition</p>

</div>

<!-- Forecast -->

<div class="forecast" id="forecast"></div>

<!-- Chart -->

<canvas id="tempChart"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
